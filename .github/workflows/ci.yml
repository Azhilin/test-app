# ──────────────────────────────────────────────────────────────────────────────
# CI Pipeline — AI Adoption Metrics Report
# ──────────────────────────────────────────────────────────────────────────────
#
# STAGES (all disabled by default):
#   unit-tests        → pure functions, no I/O
#   component-tests   → filesystem / HTTP, no cross-module orchestration
#   integration-tests → full pipeline with mocked I/O (needs Jira secrets)
#   e2e-tests         → Playwright browser + live server (needs Jira secrets)
#   windows-tests     → Windows-only socket error path (runs on windows-latest)
#   security-scan     → pip-audit vulnerability check on production deps
#
# HOW TO ENABLE A STAGE:
#   Automatic (push / PR):  GitHub → Settings → Variables → Actions
#                           Set variable to the string  true
#       ENABLE_UNIT              unit-tests
#       ENABLE_COMPONENT         component-tests
#       ENABLE_INTEGRATION       integration-tests
#       ENABLE_E2E               e2e-tests
#       ENABLE_WINDOWS_TESTS     windows-tests
#       ENABLE_SECURITY_SCAN     security-scan
#
#   Manual one-off run:     Actions tab → "CI" → "Run workflow"
#                           Toggle the corresponding boolean input.
#
# RESTRICT TO MASTER ONLY:
#   GitHub → Settings → Variables → Actions
#   Set  RESTRICT_TO_MASTER = true
#   All automatic (push/PR) runs on non-master branches will be skipped.
#   workflow_dispatch (manual) runs are never restricted by this flag.
#
# JIRA SECRETS (required by integration + e2e stages):
#   GitHub → Settings → Secrets → Actions
#       JIRA_URL          https://your-org.atlassian.net
#       JIRA_EMAIL        your@email.com
#       JIRA_API_TOKEN    <Atlassian API token>
# ──────────────────────────────────────────────────────────────────────────────

name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:
    inputs:
      run_unit:
        description: "Run Unit Tests"
        type: boolean
        default: false
      run_component:
        description: "Run Component Tests"
        type: boolean
        default: false
      run_integration:
        description: "Run Integration Tests (requires Jira secrets)"
        type: boolean
        default: false
      run_e2e:
        description: "Run E2E Tests — Playwright + live server (requires Jira secrets)"
        type: boolean
        default: false
      run_windows:
        description: "Run Windows-specific Tests (windows-latest runner)"
        type: boolean
        default: false
      run_security:
        description: "Run Security Scan — pip-audit"
        type: boolean
        default: false

# Cancel superseded runs on the same branch to save runner minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"

# ── Shared condition fragments (referenced in each job's `if:`) ───────────────
# A job runs when EITHER:
#   a) Triggered manually (workflow_dispatch) AND the matching input is true, OR
#   b) Triggered automatically (push/PR) AND:
#        - the matching ENABLE_* repo variable is set to 'true', AND
#        - RESTRICT_TO_MASTER is not 'true', OR we are on the master branch.
# ─────────────────────────────────────────────────────────────────────────────

jobs:

  # ── Unit Tests ──────────────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'workflow_dispatch' && inputs.run_unit) ||
      (github.event_name != 'workflow_dispatch' &&
       vars.ENABLE_UNIT == 'true' &&
       (vars.RESTRICT_TO_MASTER != 'true' || github.ref == 'refs/heads/master'))
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements*.txt

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Run unit tests
        run: >-
          pytest tests/unit/
          -m "unit and not windows_only"
          --tb=short
          --junitxml=results/unit.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: unit-results
          path: results/unit.xml

  # ── Component Tests ─────────────────────────────────────────────────────────
  component-tests:
    name: Component Tests
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'workflow_dispatch' && inputs.run_component) ||
      (github.event_name != 'workflow_dispatch' &&
       vars.ENABLE_COMPONENT == 'true' &&
       (vars.RESTRICT_TO_MASTER != 'true' || github.ref == 'refs/heads/master'))
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements*.txt

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Run component tests
        run: >-
          pytest tests/component/
          -m "component and not windows_only"
          --tb=short
          --junitxml=results/component.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: component-results
          path: results/component.xml

  # ── Integration Tests ────────────────────────────────────────────────────────
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'workflow_dispatch' && inputs.run_integration) ||
      (github.event_name != 'workflow_dispatch' &&
       vars.ENABLE_INTEGRATION == 'true' &&
       (vars.RESTRICT_TO_MASTER != 'true' || github.ref == 'refs/heads/master'))
    env:
      JIRA_URL: ${{ secrets.JIRA_URL }}
      JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
      JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements*.txt

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Run integration tests
        run: >-
          pytest tests/integration/
          -m "integration and not windows_only"
          --tb=short
          --junitxml=results/integration.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: integration-results
          path: results/integration.xml

  # ── E2E Tests ────────────────────────────────────────────────────────────────
  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'workflow_dispatch' && inputs.run_e2e) ||
      (github.event_name != 'workflow_dispatch' &&
       vars.ENABLE_E2E == 'true' &&
       (vars.RESTRICT_TO_MASTER != 'true' || github.ref == 'refs/heads/master'))
    env:
      JIRA_URL: ${{ secrets.JIRA_URL }}
      JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
      JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements*.txt

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      # Cache the Playwright browser binary (~120 MB) keyed to requirements-dev.txt.
      # System-level dependencies (apt packages) are always installed because they
      # are not cached and are required even on a cache hit.
      - name: Cache Playwright browser binary
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ hashFiles('requirements-dev.txt') }}

      - name: Install Playwright system dependencies
        run: playwright install-deps chromium

      - name: Install Playwright browser binary
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: playwright install chromium

      - name: Run E2E tests
        run: >-
          pytest tests/e2e/
          -m "e2e and not windows_only"
          --tb=short
          --junitxml=results/e2e.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-results
          path: results/e2e.xml

  # ── Windows-specific Tests ───────────────────────────────────────────────────
  # Runs ONLY the tests decorated with @pytest.mark.windows_only.
  # These cover OS-specific socket error behaviour (ConnectionAbortedError /
  # WSAECONNABORTED) that cannot be observed on Linux/macOS.
  windows-tests:
    name: Windows-specific Tests
    runs-on: windows-latest
    if: >-
      (github.event_name == 'workflow_dispatch' && inputs.run_windows) ||
      (github.event_name != 'workflow_dispatch' &&
       vars.ENABLE_WINDOWS_TESTS == 'true' &&
       (vars.RESTRICT_TO_MASTER != 'true' || github.ref == 'refs/heads/master'))
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements*.txt

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Run Windows-specific tests
        run: >-
          pytest tests/
          -m windows_only
          --tb=short
          --junitxml=results/windows.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: windows-results
          path: results/windows.xml

  # ── Security Scan ────────────────────────────────────────────────────────────
  # Audits production dependencies for known CVEs using pip-audit.
  # Only scans requirements.txt (not dev deps) to minimise noise.
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'workflow_dispatch' && inputs.run_security) ||
      (github.event_name != 'workflow_dispatch' &&
       vars.ENABLE_SECURITY_SCAN == 'true' &&
       (vars.RESTRICT_TO_MASTER != 'true' || github.ref == 'refs/heads/master'))
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements*.txt

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit production dependencies
        run: pip-audit -r requirements.txt

  # ── CI Summary ───────────────────────────────────────────────────────────────
  # Always runs; writes a markdown summary to the Actions job page.
  # Fails the workflow if any job that actually ran returned 'failure'.
  # Skipped jobs do not count as failures.
  ci-summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs:
      - unit-tests
      - component-tests
      - integration-tests
      - e2e-tests
      - windows-tests
      - security-scan
    if: always()
    steps:
      - name: Write job summary
        run: |
          echo "## CI Results — ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Triggered by: \`${{ github.event_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Stage | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Unit Tests | ${{ needs.unit-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Component Tests | ${{ needs.component-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Integration Tests | ${{ needs.integration-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| E2E Tests | ${{ needs.e2e-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Windows Tests | ${{ needs.windows-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Security Scan | ${{ needs.security-scan.result }} |" >> $GITHUB_STEP_SUMMARY

      - name: Fail if any enabled job failed
        if: contains(needs.*.result, 'failure')
        run: |
          echo "One or more CI stages failed. See the table above." >&2
          exit 1
